name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  openspec-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate OpenSpec artifacts
        run: ./scripts/validate-openspec.sh

      - name: Run Maven tests
        run: ./mvnw -q test
